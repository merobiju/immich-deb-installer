name: Build DEB Package
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DEB
        run: |
          chmod +x DEBIAN/postinst
          mkdir -p build-dir/DEBIAN
          cp DEBIAN/control build-dir/DEBIAN/
          cp DEBIAN/postinst build-dir/DEBIAN/
          dpkg-deb --build build-dir immich-installer.deb
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-deb-package
          path: immich-installer.deb
